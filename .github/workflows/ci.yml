name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest
        run: npm test -- --runInBand

  python-smoke:
    name: Python Ops Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/ci/requirements-smoke.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/ci/requirements-smoke.txt

      - name: Run ops smoke tests
        run: python -m unittest discover -s tests/python -p "test_ops_smoke.py" -v

      - name: Run reload/score stress harness self-test
        run: python scripts/stress_ml_reload_score.py --self-test --duration-sec 1.5 --score-workers 3 --reload-interval-ms 80 --fail-on-error

  python-fast:
    name: Python Fast Tests (prediction-log + sklearn compat + research protocol)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No cache: pip here — we install a single package inline and have no
          # requirements.txt / pyproject.toml for setup-python to key on.

      - name: Install test dependencies
        # scikit-learn: needed by test_sklearn_remainder_compat.
        # pandas: needed by test_audit_logger (exercises hash_dataframe_schema_or_csv).
        # All other suites (prediction-log reliability, remaining protocol tests)
        # are stdlib-only.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "scikit-learn==1.5.2" "pandas==2.2.3"

      - name: Prediction-log reliability tests
        run: python -m unittest discover -s tests/python -p "test_prediction_log_reliability.py" -v

      - name: sklearn compat tests
        run: python -m unittest discover -s tests/python -p "test_sklearn_remainder_compat.py" -v

      - name: Research-protocol unit tests
        run: python -m unittest discover -s tests/unit/test_research_protocol -p "test_*.py" -v
